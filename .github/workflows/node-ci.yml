name: HARAKA Admin CI (Frontend-only)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Clean Docker
        run: sudo docker system prune -a -f --volumes || true

      - name: Remove old container
        run: sudo docker rm -f haraka-admin || true

      - name: Build Docker image
        run: sudo docker build -t haraka-admin:local .

      - name: Run Docker container
        run: sudo docker run -d -p 80:80 --name haraka-admin haraka-admin:local